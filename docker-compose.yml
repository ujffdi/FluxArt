services:
  app:
    image: ${FLUXART_APP_IMAGE:-fluxart-app:latest}
    restart: ${FLUXART_RESTART_POLICY:-no}
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3107
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:3207:3107"
    command: sh -c "npx prisma migrate deploy && npm run start"

  mysql:
    image: mysql:8.4
    restart: ${FLUXART_RESTART_POLICY:-no}
    env_file:
      - .env.production
    environment:
      MYSQL_DATABASE: fluxart
      MYSQL_USER: fluxart
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u fluxart -p\"$${MYSQL_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: ${FLUXART_RESTART_POLICY:-no}
    env_file:
      - .env.production
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    env_file:
      - .env.production
    depends_on:
      minio:
        condition: service_started
    entrypoint: /bin/sh
    command: >
      -c "
      until mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\"; do sleep 2; done &&
      mc mb --ignore-existing \"local/$${MINIO_BUCKET}\" &&
      mc anonymous set download \"local/$${MINIO_BUCKET}\"
      "

volumes:
  mysql-data:
  minio-data:
